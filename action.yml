name: "Statio Deploy"
description: "Deploy a signed image to your own server over Tailscale — no SSH, no public port."
author: "accentiostudios"
branding:
  icon: "upload-cloud"
  color: "purple"

inputs:
  target:
    description: "Agent MagicDNS host (e.g. statio.tailnet.ts.net). Also the signed audience."
    required: true
  service:
    description: "Service slot name (must be accepted on the agent)"
    required: true
  image:
    description: "Your app's image repository (e.g. ghcr.io/org/api)"
    required: true
  digest:
    description: "Image digest (sha256:...), e.g. steps.build.outputs.digest"
    required: true
  statio-file:
    description: "Path to the repo's statio.yaml (services + proxy + dns)"
    required: false
    default: "statio.yaml"
  env:
    description: "Per-deploy env overrides as KEY=VALUE lines (source from ${{ secrets.* }} so GitHub masks them)"
    required: false
    default: ""
  ts-authkey:
    description: "Tailscale tag:ci auth key (minted by `statio init server`; store as a GitHub secret)"
    required: true
  statio-version:
    description: "Version of the statio binary to download (a bare major like v1, or an exact vX.Y.Z, or latest)"
    required: false
    default: "v1"
  timeout:
    description: "Deploy timeout (e.g. 5m)"
    required: false
    default: "5m"
  strict:
    description: "Treat success_degraded as failure"
    required: false
    default: "false"

# NOTE: the calling workflow MUST grant `permissions: id-token: write` so cosign can sign
# the deploy payload keyless with the run's OIDC identity (the same identity that signs the
# image). The agent verifies that signature before applying anything.
runs:
  using: composite
  steps:
    - name: Install statio binary
      shell: bash
      run: ${{ github.action_path }}/action/install-statio.sh "${{ inputs.statio-version }}"
    - name: Install cosign
      uses: sigstore/cosign-installer@v3
    - name: Join tailnet (ephemeral tag:ci node)
      uses: tailscale/github-action@v3
      with:
        authkey: ${{ inputs.ts-authkey }}
    - name: Deploy
      shell: bash
      env:
        # Secrets go via env, never argv (process listing / set -x). GitHub masks values
        # sourced from ${{ secrets.* }}.
        STATIO_ENV_OVERRIDES: ${{ inputs.env }}
        STATIO_TARGET: ${{ inputs.target }}
        STATIO_SERVICE: ${{ inputs.service }}
        STATIO_IMAGE: ${{ inputs.image }}
        STATIO_DIGEST: ${{ inputs.digest }}
        STATIO_FILE: ${{ inputs.statio-file }}
        STATIO_DEPLOY_SEQ: ${{ github.run_number }}
        STATIO_TIMEOUT: ${{ inputs.timeout }}
        STATIO_STRICT: ${{ inputs.strict }}
      run: ${{ github.action_path }}/action/deploy.sh
