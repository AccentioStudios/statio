name: "Statio Deploy"
description: "Deploy a signed image to your own server over Tailscale — no SSH, no public port."
author: "accentiostudios"
branding:
  icon: "upload-cloud"
  color: "purple"

inputs:
  target:
    description: "Agent MagicDNS host (e.g. statio.tailnet.ts.net). Also the signed audience."
    required: true
  service:
    description: "Service slot name (must be accepted on the agent)"
    required: true
  image:
    description: "Your app's image repository (e.g. ghcr.io/org/api)"
    required: true
  digest:
    description: "Image digest (sha256:...). Leave empty to let the action build & push the image for you."
    required: false
    default: ""
  dockerfile:
    description: "Dockerfile path, when the action builds the image"
    required: false
    default: "Dockerfile"
  context:
    description: "Docker build context, when the action builds the image"
    required: false
    default: "."
  image-tag:
    description: "Tag to push the built image under (the deployed reference is always the digest)"
    required: false
    default: ${{ github.sha }}
  sign:
    description: "cosign-sign the image with the run's keyless identity. Disable only if you already sign it yourself."
    required: false
    default: "true"
  registry-username:
    description: "Registry login user when the action pushes (defaults to the GitHub actor, for GHCR)"
    required: false
    default: ""
  registry-password:
    description: "Registry login token when the action pushes (defaults to GITHUB_TOKEN, for GHCR; needs packages: write)"
    required: false
    default: ""
  statio-file:
    description: "Path to the repo's statio.yaml (services + proxy + dns)"
    required: false
    default: "statio.yaml"
  env:
    description: "Per-deploy env overrides as KEY=VALUE lines (source values from your repo/org secrets so GitHub masks them)"
    required: false
    default: ""
  ts-oauth-client-id:
    description: "Tailscale OAuth client id for CI (a tag:ci client, scope auth_keys). Store as a GitHub secret."
    required: true
  ts-oauth-secret:
    description: "Tailscale OAuth client secret for CI (the tag:ci client). Store as a GitHub secret."
    required: true
  statio-version:
    description: "Version of the statio binary to download (a bare major like v1, or an exact vX.Y.Z, or latest)"
    required: false
    default: "v1"
  timeout:
    description: "Deploy timeout (e.g. 5m)"
    required: false
    default: "5m"
  strict:
    description: "Treat success_degraded as failure"
    required: false
    default: "false"

# NOTE: the calling workflow MUST grant `permissions: id-token: write` so cosign can sign
# the deploy payload keyless with the run's OIDC identity (the same identity that signs the
# image). The agent verifies that signature before applying anything.
runs:
  using: composite
  steps:
    - name: Install statio binary
      shell: bash
      run: ${{ github.action_path }}/action/install-statio.sh "${{ inputs.statio-version }}"
    - name: Install cosign
      uses: sigstore/cosign-installer@v3
    - name: Build, push & sign the image
      shell: bash
      env:
        STATIO_IMAGE: ${{ inputs.image }}
        STATIO_DIGEST: ${{ inputs.digest }}
        STATIO_DOCKERFILE: ${{ inputs.dockerfile }}
        STATIO_CONTEXT: ${{ inputs.context }}
        STATIO_TAG: ${{ inputs.image-tag }}
        STATIO_SIGN: ${{ inputs.sign }}
        STATIO_REGISTRY_USERNAME: ${{ inputs.registry-username || github.actor }}
        STATIO_REGISTRY_PASSWORD: ${{ inputs.registry-password || github.token }}
      run: ${{ github.action_path }}/action/build-sign.sh
    - name: Join tailnet (ephemeral tag:ci node)
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ inputs.ts-oauth-client-id }}
        oauth-secret: ${{ inputs.ts-oauth-secret }}
        tags: tag:ci
    - name: Deploy
      shell: bash
      env:
        # Secrets go via env, never argv (process listing / set -x). GitHub masks values
        # the calling workflow sources from its secrets.
        STATIO_ENV_OVERRIDES: ${{ inputs.env }}
        STATIO_TARGET: ${{ inputs.target }}
        STATIO_SERVICE: ${{ inputs.service }}
        STATIO_IMAGE: ${{ inputs.image }}
        STATIO_DIGEST: ${{ inputs.digest }}
        STATIO_FILE: ${{ inputs.statio-file }}
        STATIO_DEPLOY_SEQ: ${{ github.run_number }}
        STATIO_TIMEOUT: ${{ inputs.timeout }}
        STATIO_STRICT: ${{ inputs.strict }}
      run: ${{ github.action_path }}/action/deploy.sh
