# GoReleaser: produce los binarios, checksums y firmas cosign que install.sh y la Action
# (action/install-statio.sh) descargan desde GitHub Releases. Dispara con: git tag vX.Y.Z && git push --tags
version: 2

project_name: statio

before:
  hooks:
    - go mod tidy

builds:
  - id: statio
    main: ./cmd/statio
    binary: statio
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

# Sube el binario crudo como statio_<os>_<arch> (sin versión en el nombre) para que
# /releases/latest/download/statio_linux_amd64 resuelva siempre al último.
archives:
  - id: bin
    formats: [binary]
    name_template: "statio_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Firma cosign keyless del checksums.txt (dogfooding: el proyecto firma sus propios releases).
# `certificate:` es obligatorio para que el .pem se registre como artefacto y se suba al
# release; sin él GoReleaser deja ${certificate} vacío y solo sube el .sig (no verificable).
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

# Paquetes para el servidor: instala el binario en /usr/local/bin (la unit systemd la
# genera `statio init server`).
nfpms:
  - id: pkgs
    package_name: statio
    formats: [deb, rpm]
    maintainer: accentiostudios
    description: Deploy a self-hosted server without SSH or a public port
    homepage: https://github.com/accentiostudios/statio
    bindir: /usr/local/bin

release:
  github:
    owner: accentiostudios
    name: statio
